name: Dockerized App Deployment
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy using ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 24700
          script: |
            cd FoodDeliverySystem
            # Sao lưu .env để không bị mất khi git pull xóa file khỏi tracking
            [ -f .env ] && cp .env .env.bak || true
            
            git fetch origin
            git checkout main
            git pull origin main
            
            # Khôi phục lại .env từ bản sao lưu
            [ -f .env.bak ] && mv .env.bak .env || true
            
            # 1. Build image (BẮT BUỘC có dấu chấm ở cuối)
            docker build -t online-food-app .
            
            # 2. Dọn dẹp container cũ
            docker stop food-app || true
            docker rm food-app || true
            
            # 3. Chạy container mới
            docker run -d --name food-app --env-file .env -p 8080:4000 online-food-app